<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WebGPU Life 3D</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020817;
        --panel: rgba(5, 13, 31, 0.78);
        --panel-strong: rgba(8, 20, 46, 0.94);
        --line: rgba(102, 232, 255, 0.22);
        --cyan: #31d9ff;
        --pink: #ff36d3;
        --green: #73ff8f;
        --text: #eaf8ff;
        --muted: #8fa9bc;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background:
          linear-gradient(135deg, rgba(1, 4, 17, 0.94), rgba(3, 18, 46, 0.98)),
          repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.025) 0 1px, transparent 1px 4px);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body::after {
        position: fixed;
        inset: 0;
        pointer-events: none;
        content: "";
        background:
          linear-gradient(90deg, rgba(49, 217, 255, 0.05), transparent 30%, rgba(255, 54, 211, 0.05)),
          linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.34));
        mix-blend-mode: screen;
      }

      .app {
        position: relative;
        width: 100vw;
        height: 100vh;
        min-height: 520px;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #020817;
        outline: none;
        cursor: grab;
      }

      canvas:active {
        cursor: grabbing;
      }

      .topbar,
      .unsupported {
        position: absolute;
        z-index: 2;
        border: 1px solid var(--line);
        background: var(--panel);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.03) inset,
          0 14px 40px rgba(0, 0, 0, 0.38),
          0 0 30px rgba(49, 217, 255, 0.08);
        backdrop-filter: blur(16px);
      }

      .topbar {
        left: 16px;
        right: 16px;
        bottom: 16px;
        display: grid;
        grid-template-columns: auto auto minmax(160px, 1fr) auto auto minmax(284px, auto);
        gap: 10px;
        align-items: center;
        min-height: 72px;
        padding: 12px;
        border-radius: 8px;
      }

      .brand {
        display: flex;
        flex-direction: column;
        min-width: 130px;
        letter-spacing: 0;
      }

      .brand strong {
        font-size: 14px;
        font-weight: 800;
      }

      .brand span,
      .stat-label,
      label span {
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .stat-value {
        color: var(--cyan);
        font-size: 15px;
        font-weight: 800;
        text-shadow: 0 0 18px rgba(49, 217, 255, 0.55);
      }

      button,
      input {
        height: 38px;
        border: 1px solid rgba(102, 232, 255, 0.25);
        border-radius: 8px;
        background: rgba(3, 14, 33, 0.86);
        color: var(--text);
        font: inherit;
      }

      button {
        min-width: 82px;
        padding: 0 14px;
        font-size: 13px;
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 0 18px rgba(49, 217, 255, 0.1);
      }

      button.primary {
        border-color: rgba(255, 54, 211, 0.5);
        background: linear-gradient(135deg, rgba(0, 185, 255, 0.24), rgba(255, 54, 211, 0.28));
      }

      button:hover,
      input:focus {
        border-color: rgba(115, 255, 143, 0.58);
        box-shadow: 0 0 22px rgba(115, 255, 143, 0.16);
      }

      button:active {
        transform: translateY(1px);
      }

      .control {
        display: grid;
        gap: 5px;
      }

      .control.range {
        min-width: 170px;
      }

      .control.range input {
        width: 100%;
        accent-color: var(--pink);
      }

      .grid-control {
        display: grid;
        grid-template-columns: repeat(3, 56px) auto;
        gap: 8px;
        align-items: end;
      }

      .grid-control label {
        display: grid;
        gap: 5px;
      }

      input[type="number"] {
        width: 56px;
        padding: 0 8px;
        font-weight: 800;
        text-align: center;
      }

      .toggle {
        display: flex;
        gap: 8px;
        align-items: center;
        min-width: 110px;
        height: 38px;
        padding: 0 12px;
        border: 1px solid rgba(102, 232, 255, 0.25);
        border-radius: 8px;
        background: rgba(3, 14, 33, 0.72);
        font-size: 13px;
        font-weight: 800;
      }

      .toggle input {
        width: 16px;
        height: 16px;
        accent-color: var(--green);
      }

      .unsupported {
        top: 50%;
        left: 50%;
        display: none;
        width: min(420px, calc(100vw - 32px));
        padding: 20px;
        border-radius: 8px;
        transform: translate(-50%, -50%);
      }

      .unsupported.visible {
        display: block;
      }

      .unsupported h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }

      .unsupported p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      @media (max-width: 920px) {
        .app {
          min-height: 620px;
        }

        .topbar {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          align-items: stretch;
        }

        .brand,
        .control.range,
        .grid-control,
        .toggle {
          min-width: 0;
          width: 100%;
        }

        .grid-control {
          grid-column: 1 / -1;
          grid-template-columns: repeat(3, 1fr) auto;
        }

        input[type="number"] {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <canvas id="lifeCanvas" aria-label="Automato celular Life-like 3D em WebGPU" tabindex="0"></canvas>
